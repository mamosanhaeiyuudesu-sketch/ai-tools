name: Deploy ai-consultant (Pages)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/ai-consultant/**'
      - 'package.json'
      - 'yarn.lock'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build:ai-consultant

      - name: Deploy
        run: npx wrangler pages deploy apps/ai-consultant/.output/public --project-name=ai-consultant-mamorin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
